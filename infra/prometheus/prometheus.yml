global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: "backend"
    static_configs:
      - targets: ["backend:3000"]
    metrics_path: /metrics

  - job_name: "strategy-engine"
    static_configs:
      - targets: ["strategy-engine:8001"]
    metrics_path: /metrics

  - job_name: "execution-engine"
    static_configs:
      - targets: ["execution-engine:8002"]
    metrics_path: /metrics
