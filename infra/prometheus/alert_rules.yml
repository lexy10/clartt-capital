groups:
  - name: trading_alerts
    rules:
      - alert: HighTradeExecutionLatency
        expr: histogram_quantile(0.95, rate(trade_execution_latency_ms_bucket[5m])) > 500
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High trade execution latency detected"
          description: "95th percentile trade execution latency is above 500ms for more than 2 minutes."

      - alert: HighAPIResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API response time exceeding 100ms target"
          description: "95th percentile API response time is above 100ms for more than 5 minutes."

      - alert: HighTradeRejectionRate
        expr: rate(trades_rejected_total[5m]) / (rate(trades_executed_total[5m]) + rate(trades_rejected_total[5m])) > 0.5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High trade rejection rate"
          description: "More than 50% of trades are being rejected for over 5 minutes."
