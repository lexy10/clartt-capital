server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Security headers. The CSP mainly limits what injected script could do:
    # no external script/connect targets, no framing. 'unsafe-inline' styles
    # stay because the React components use inline style attributes.
    # JWTs live in localStorage, so XSS hardening here directly protects
    # session + broker data.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
        # NOTE: add_header inside a location suppresses inherited server-level
        # headers for that location — re-declare the security set here.
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'" always;
    }

    # Service-to-service endpoints (/api/internal/*) are unauthenticated and
    # return full strategy configs + raw market data. They're meant for sibling
    # containers on the Docker network only — never expose them to the internet.
    # This regex block is defined before the general /api proxy so it wins.
    location ~ ^/api/internal/ {
        return 404;
    }

    location ~ ^/api/(.*)$ {
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream/api/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }

    location ~ ^/socket\.io/(.*)$ {
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream/socket.io/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }
}
