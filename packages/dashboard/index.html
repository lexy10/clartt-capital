<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clartt Capital — Portfolio Management System</title>
    <script>
      // Apply the persisted theme before React mounts to avoid a flash of the
      // wrong palette. Mirrors themeStore.ts (keys + resolution).
      (function () {
        try {
          var p = JSON.parse(localStorage.getItem('dashboard:theme') || '{}');
          var mode = p.mode || 'dark';
          if (mode === 'system') {
            mode = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          var root = document.documentElement;
          root.setAttribute('data-theme', mode);
          root.setAttribute('data-accent', p.accent || 'indigo');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
