name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Cancel in-flight deploys when a new push lands — last commit wins.
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # GitHub usernames/orgs are case-insensitive but ghcr.io requires lowercase.
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  test:
    name: Test ${{ matrix.pkg.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkg:
          - { name: backend,          kind: node,   dir: packages/backend }
          - { name: dashboard,        kind: node,   dir: packages/dashboard }
          - { name: strategy-engine,  kind: python, dir: packages/strategy-engine }
          - { name: execution-engine, kind: python, dir: packages/execution-engine }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        if: matrix.pkg.kind == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.pkg.dir }}/package-lock.json

      - name: Node tests
        if: matrix.pkg.kind == 'node'
        working-directory: ${{ matrix.pkg.dir }}
        run: |
          npm ci
          npm test

      - name: Set up Python
        if: matrix.pkg.kind == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ${{ matrix.pkg.dir }}/requirements.txt

      - name: Python tests
        if: matrix.pkg.kind == 'python'
        working-directory: ${{ matrix.pkg.dir }}
        run: |
          pip install -r requirements.txt
          python -m pytest tests -q

  build:
    name: Build & push images
    runs-on: ubuntu-latest
    # Red tests must never reach the machine running real money.
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      # Build all four services in parallel. fail-fast off so one slow
      # service doesn't kill the others mid-build.
      fail-fast: false
      matrix:
        service:
          - { name: dashboard,        context: packages/dashboard }
          - { name: backend,          context: packages/backend }
          - { name: strategy-engine,  context: packages/strategy-engine }
          - { name: execution-engine, context: packages/execution-engine }
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        # ghcr.io rejects mixed-case namespaces. Force lowercase.
        run: echo "IMAGE_OWNER_LC=$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER_LC }}/clartt-${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER_LC }}/clartt-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "IMAGE_OWNER_LC=$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up SSH
        # Loads the private deploy key from secrets and trusts the VPS's
        # host key on first connect. Once trusted it stays in known_hosts
        # for the rest of the job.
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync compose files & deploy scripts to VPS
        # Only ship what the VPS needs to run docker compose. Source code
        # is baked into the GHCR images, so we don't rsync packages/.
        run: |
          rsync -az \
            docker-compose.yml \
            docker-compose.prod.yml \
            docker-compose.tls.yml \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/"
          rsync -az --delete deploy/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/deploy/"

      - name: Write .env on VPS
        # The .env is gitignored, so it lives in GitHub secrets as a single
        # blob and gets written fresh each deploy. Atomic write via a temp
        # file so a partial write can never poison the live process.
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "umask 077 && cat > '${{ secrets.VPS_PATH }}/.env.new' <<'__ENV_EOF__'
          ${{ secrets.VPS_ENV_FILE }}
          __ENV_EOF__
          mv '${{ secrets.VPS_PATH }}/.env.new' '${{ secrets.VPS_PATH }}/.env'"

      - name: Pull images, self-bootstrap DB, restart stack
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            set -e
            cd '${{ secrets.VPS_PATH }}'
            export IMAGE_REPO_OWNER='${{ env.IMAGE_OWNER_LC }}'
            export IMAGE_TAG='$IMAGE_TAG'
            set -a; . ./.env; set +a

            # Compose files: always base+prod; add TLS automatically once a
            # domain is configured (Caddy fronts the dashboard on 80/443).
            COMPOSE='-f docker-compose.yml -f docker-compose.prod.yml'
            if grep -qE '^CLARTT_DOMAIN=.+' .env; then
              COMPOSE=\"\$COMPOSE -f docker-compose.tls.yml\"
              echo 'TLS enabled (CLARTT_DOMAIN set)'
            fi

            # Authenticate the VPS's docker to GHCR (short-lived run token).
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

            # Pull with retries — Contabo's IPv6 path to ghcr.io's CDN can reset
            # mid-transfer. Each retry resumes already-downloaded layers, so a
            # reset just costs one more attempt rather than a full re-pull.
            pull_ok=0
            for attempt in \$(seq 1 6); do
              if docker compose \$COMPOSE pull; then pull_ok=1; break; fi
              echo \"pull attempt \$attempt failed (network reset?); retrying in 15s\"
              sleep 15
            done
            if [ \"\$pull_ok\" != 1 ]; then
              echo 'Image pull failed after 6 attempts — likely a GHCR/network issue, not a build failure. Re-run the workflow.'
              exit 1
            fi

            # --- Self-bootstrapping DB (idempotent) ---
            # Bring up the data layer first; if the DB is empty (first ever
            # deploy) load the schema + baseline migrations. On every later
            # deploy the DB has tables, so this is skipped. The backend's
            # migrationsRun then runs any NEW migrations on top.
            docker compose \$COMPOSE up -d postgres redis
            for i in \$(seq 1 30); do
              docker compose \$COMPOSE exec -T postgres pg_isready -U \"\$POSTGRES_USER\" >/dev/null 2>&1 && break
              sleep 2
            done
            TABLES=\$(docker compose \$COMPOSE exec -T postgres psql -U \"\$POSTGRES_USER\" -d \"\$POSTGRES_DB\" -t -A -c \"SELECT count(*) FROM information_schema.tables WHERE table_schema='public';\" 2>/dev/null || echo 0)
            if [ \"\$TABLES\" = \"0\" ]; then
              echo 'Fresh database — bootstrapping schema + migration baseline'
              bash deploy/vps-init-schema.sh '${{ secrets.VPS_PATH }}'
            else
              echo \"Database already has \$TABLES tables — skipping schema init\"
            fi

            docker compose \$COMPOSE up -d --remove-orphans

            # Prune dangling images — keeps the previous tag so rollback via
            # 'IMAGE_TAG=<prev-sha> docker compose up -d' still works.
            docker image prune -f
          "

      - name: Smoke test
        # Verify backend is actually serving after the restart. Wait up to 90s
        # — the FIRST deploy also runs migrations + seeds before the backend
        # listens, which takes longer than a steady-state restart.
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            for i in \$(seq 1 30); do
              if curl -sf http://localhost:3000/api/health > /dev/null; then
                echo 'Backend healthy'
                exit 0
              fi
              sleep 3
            done
            echo 'Backend did not become healthy in 90s'
            docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=80 backend
            exit 1
          "
